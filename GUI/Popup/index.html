<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CAI Control</title>
    <link rel="stylesheet" href="./style.css" />
</head>
<body>
    <main class="popup">
        <section class="panel shadow-sm">
            <header class="top-row">
                <div class="brand-wrap">
                    <svg class="brand-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                    <p class="brand">CAI</p>
                </div>
                <label class="model-select-wrap" for="modelSelect">
                    <select id="modelSelect" aria-label="Choose model">
                        <option value="openai/gpt-4.1">GPT-4.1</option>
                        <option value="deepseek/DeepSeek-R1">DeepSeek R1</option>
                        <option value="x-ai/grok-2">Grok 2</option>
                    </select>
                    <svg class="chevron" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
                </label>
            </header>

            <section class="center-stage" id="screen-main" aria-live="polite">
                <button class="feature-circle pulse-hover" id="featureBadge" type="button">
                    <div class="icon-wrap">
                        <svg id="featureIcon" xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1 .2 2.2 1.5 3.5.7.7 1.3 1.5 1.5 2.5"/><path d="M9 18h6"/><path d="M10 22h4"/></svg>
                    </div>
                    <span class="circle-title" id="featureTitle">Analyzer</span>
                    <span class="circle-subtitle" id="featureSubtitle">Tap to start</span>
                </button>
            </section>

            <section class="settings-panel" id="screen-settings" hidden>
                <div class="settings-group">
                    <div class="settings-row">
                        <div class="settings-info">
                            <div class="settings-label">Light Theme</div>
                            <div class="settings-hint">Switch popup color mode</div>
                        </div>
                        <label class="switch">
                            <input type="checkbox" id="themeToggle" />
                            <span class="switch-track"></span>
                        </label>
                    </div>
                    <div class="settings-divider"></div>
                    <div class="settings-row">
                        <div class="settings-info">
                            <div class="settings-label">Selection Indicator</div>
                            <div class="settings-hint">Show text highlight markers</div>
                        </div>
                        <label class="switch">
                            <input type="checkbox" id="selectionToggle" checked />
                            <span class="switch-track"></span>
                        </label>
                    </div>
                    <div class="settings-divider"></div>
                    <div class="settings-row">
                        <div class="settings-info">
                            <div class="settings-label">Toolbar Analyzer</div>
                            <div class="settings-hint">Show analyzer button in floating toolbar</div>
                        </div>
                        <label class="switch">
                            <input type="checkbox" id="toolbarAnalyzerToggle" checked />
                            <span class="switch-track"></span>
                        </label>
                    </div>
                    <div class="settings-divider"></div>
                    <div class="settings-row">
                        <div class="settings-info">
                            <div class="settings-label">Toolbar Snip</div>
                            <div class="settings-hint">Show snip button in floating toolbar</div>
                        </div>
                        <label class="switch">
                            <input type="checkbox" id="toolbarSnipToggle" checked />
                            <span class="switch-track"></span>
                        </label>
                    </div>
                    <div class="settings-divider"></div>
                    <div class="settings-row">
                        <div class="settings-info">
                            <div class="settings-label">Toolbar Voice</div>
                            <div class="settings-hint">Show voice button in floating toolbar</div>
                        </div>
                        <label class="switch">
                            <input type="checkbox" id="toolbarVoiceToggle" checked />
                            <span class="switch-track"></span>
                        </label>
                    </div>
                </div>
            </section>

            <nav class="feature-tabs" aria-label="Feature toolbar">
                <button class="tab-btn active" type="button" id="analyzerBtn" data-feature="analyzer">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                    <span>Analyzer</span>
                </button>
                <button class="tab-btn" type="button" id="snipBtn" data-feature="snip">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 12H8l-4 4 4 4h12"/><path d="M16 8V4l-4 4-4-4v4"/></svg>
                    <span>Snip</span>
                </button>
                <button class="tab-btn" type="button" id="audioBtn" data-feature="voice">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></svg>
                    <span>Voice</span>
                </button>
                <button class="tab-btn" type="button" id="settingsBtn" data-feature="settings">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
                    <span>Settings</span>
                </button>
            </nav>
        </section>

        <section class="activation-panel shadow-sm">
            <p class="status-text" id="statusText" hidden></p>
            <button class="activation-toggle" id="activationToggle" type="button" aria-pressed="false">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18.36 6.64a9 9 0 1 1-12.73 0"/><line x1="12" y1="2" x2="12" y2="12"/></svg>
                Activate on page
            </button>
        </section>
        <button class="feature-close-btn" id="voiceCloseBtn" type="button" hidden>Close Voice Popup</button>
    </main>

    <script type="module" src="./main.js"></script>
</body>
</html>
